const scrollArea=document.getElementById('scrollArea');

function switchPage(page,el){

// ── MONTH PICKER ──
function openMonthPicker(){
  const grid=document.getElementById('monthGrid');
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  grid.innerHTML='';
  const now=new Date();
  for(let y=now.getFullYear();y>=now.getFullYear()-1;y--){
    for(let m=11;m>=0;m--){
      const item=document.createElement('div');
      item.className='month-item';
      if(m===activeMonth&&y===activeYear)item.classList.add('active-month');
      const monthTx=state.transactions.filter(t=>{
        const d=new Date(t.date.slice(0,10)+'T12:00:00');
        return d.getMonth()===m&&d.getFullYear()===y;
      });
      const inc=monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const exp=monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      item.innerHTML=`<div class="month-item-name">${months[m]} ${y}</div><div class="month-item-inc">+${fmt(inc)}</div><div class="month-item-exp">-${fmt(exp)}</div>`;
      item.onclick=()=>{
        activeMonth=m;activeYear=y;
        closeModal('monthModal');
        updateHeader();
        renderHome();
      };
      grid.appendChild(item);
    }
  }
  openModal('monthModal');
}

function updateHeader(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('currentMonth').textContent=months[activeMonth]+' '+activeYear;
}

// ── TRANSACTION MODAL ──
let editingTxId=null;

function openTxModal(txId=null,presetIncomeSourceId=null){
  editingTxId=txId;

      txType=tx.type;
      document.getElementById('txAmount').value=tx.amount;
      document.getElementById('txNote').value=tx.note||'';
      document.getElementById('txDate').value=tx.date;

      selectedISId=tx.incomeSourceId;
    }
  }else{
    txType='expense';
    document.getElementById('txAmount').value='';
    document.getElementById('txNote').value='';

function setType(type){
  txType=type;
  updateTypeToggle();
  document.getElementById('catSelectGroup').style.display=type==='expense'?'block':'none';
  selectedCatId=null;
  renderCatSelect();
}

function updateTypeToggle(){
  document.getElementById('typeBtnExpense').classList.toggle('active-expense',txType==='expense');
  document.getElementById('typeBtnIncome').classList.toggle('active-income',txType==='income');
}

function renderCatSelect(){
  const grid=document.getElementById('catSelectGrid');
  if(!grid)return;
  grid.innerHTML='';
  if(txType==='expense'){
    state.categories.forEach(c=>{
      const el=document.createElement('div');
      el.className='cat-select-item';
      if(selectedCatId===c.id)el.classList.add('selected');
      el.innerHTML=`<div class="ci">${c.icon}</div><div>${c.name}</div>`;
      el.onclick=()=>{selectedCatId=c.id;renderCatSelect();};
      grid.appendChild(el);
    });
  }else{
    state.incomeSources.forEach(s=>{
      const el=document.createElement('div');
      el.className='cat-select-item';
      if(selectedISId===s.id)el.classList.add('selected');
      el.innerHTML=`<div class="ci">${s.icon}</div><div>${s.name}</div>`;
      el.onclick=()=>{selectedISId=s.id;renderCatSelect();};
      grid.appendChild(el);
    });
  }
}

async function saveTx(){
  const amount=parseFloat(document.getElementById('txAmount').value);
  if(!amount||amount<=0){toast('❌ Укажи сумму');return;}
  const note=document.getElementById('txNote').value.trim();
  const date=document.getElementById('txDate').value;
  
  setSyncing(true);
  if(editingTxId){
    const {error}=await sb.from('transactions').update({
      type:txType,amount,note,category_id:txType==='expense'?selectedCatId:null,
      income_source_id:txType==='income'?selectedISId:null,date,updated_at:new Date().toISOString()
    }).eq('id',editingTxId);
    if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
    const idx=state.transactions.findIndex(t=>t.id===editingTxId);
    if(idx!==-1){
      state.transactions[idx]={id:editingTxId,type:txType,amount,note,catId:txType==='expense'?selectedCatId:null,date,incomeSourceId:txType==='income'?selectedISId:null};
    }
  }else{
    const newTx={
      user_id:userId,type:txType,amount,note,
      category_id:txType==='expense'?selectedCatId:null,
      income_source_id:txType==='income'?selectedISId:null,date,
      created_at:new Date().toISOString()
    };
    const {data,error}=await sb.from('transactions').insert(newTx).select();
    if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
    if(data&&data[0]){
      state.transactions.push(mapTx(data[0]));
    }
  }
  setSyncing(false);
  closeModal('txModal');
  toast('✅ Сохранено');
  renderAll();
}

async function deleteTx(){
  if(!editingTxId)return;
  if(!confirm('Удалить операцию?'))return;
  setSyncing(true);
  const {error}=await sb.from('transactions').delete().eq('id',editingTxId);
  if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
  state.transactions=state.transactions.filter(t=>t.id!==editingTxId);
  setSyncing(false);
  closeModal('txModal');
  toast('🗑️ Удалено');
  renderAll();
}

  const {error}=await sb.from('income_sources').delete().eq('id',editingIncomeSourceId);
  if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
  state.incomeSources=state.incomeSources.filter(s=>s.id!==editingIncomeSourceId);
  setSyncing(false);
  closeModal('incomeSourceModal');
  toast('🗑️ Источник удалён');
  renderAll();
}

// ── INCOME CONTRIBUTE ──
let incomeContributeSourceId=null;
function openIncomeContribute(sourceId){
  incomeContributeSourceId=sourceId;
  document.getElementById('icAmount').value='';
  document.getElementById('icDate').value=todayISO();
  const s=state.incomeSources.find(is=>is.id===sourceId);
  document.getElementById('icTitle').textContent='+ доход: '+s.name;
  openModal('incomeContributeModal');
}

async function saveIncomeContribute(){
  const amount=parseFloat(document.getElementById('icAmount').value);
  if(!amount||amount<=0){toast('❌ Укажи сумму');return;}
  const date=document.getElementById('icDate').value;
  
  setSyncing(true);
  const {data,error}=await sb.from('transactions').insert({
    user_id:userId,type:'income',amount,note:'',category_id:null,
    income_source_id:incomeContributeSourceId,date,created_at:new Date().toISOString()
  }).select();
  if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
  if(data&&data[0])state.transactions.push(mapTx(data[0]));
  setSyncing(false);
  closeModal('incomeContributeModal');
  toast('✅ Доход записан');
  renderAll();
}

// ── BUDGET ──
function openBudgetSettings(){
  document.getElementById('budgetIncome').value=state.budget.income;
  openModal('budgetModal');
}

async function saveBudget(){
  const income=parseFloat(document.getElementById('budgetIncome').value)||0;
  state.budget.income=income;
  setSyncing(true);
  await saveSettings();
  setSyncing(false);
  closeModal('budgetModal');
  toast('✅ Бюджет обновлён');
  renderAll();
}

async function saveSettings(){
  const theme=document.getElementById('darkToggle')?.checked?'dark':'light';
  await sb.from('user_settings').upsert({user_id:userId,budget_income:state.budget.income,theme,updated_at:new Date().toISOString()},{onConflict:'user_id'});
}

// ── RENDER ──
function getActiveTx(){
  return state.transactions.filter(t=>isActiveMonth(t.date));
}

function renderHome(){
  const txM=getActiveTx();
  const totalIncome=txM.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense=txM.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const totalSaved=state.goals.filter(g=>g.type==='saving').reduce((s,g)=>s+g.saved,0);
  const totalDebt=state.goals.filter(g=>g.type==='debt').reduce((s,g)=>s+(g.target-g.saved),0);
  const balance=state.budget.income-totalExpense;
  
  document.getElementById('totalIncome').textContent=fmt(totalIncome);
  document.getElementById('totalExpense').textContent=fmt(totalExpense);
  document.getElementById('totalSaved').textContent=fmt(totalSaved);
  document.getElementById('totalDebt').textContent=fmt(totalDebt);
  document.getElementById('balanceCard').textContent=fmt(balance);
  const balanceSub=document.getElementById('balanceSub');
  balanceSub.textContent=balance>=0?'профицит':'дефицит';
  balanceSub.style.color=balance>=0?'var(--green-dark)':'#c07080';
  
  renderIncomeSources(txM);
  renderCategories(txM);
  renderRecentTx(txM);
  loadChartJs(()=>{renderDonut(txM);renderBar(txM);});
}

function renderCategories(txM){
  const el=document.getElementById('categoryList');
  if(!state.categories.length){
    el.innerHTML='<div class="empty-state"><div class="ei">🏷️</div><p>Категорий нет.<br>Нажми + чтобы добавить</p></div>';
    return;
  }
  el.innerHTML=state.categories.map(c=>{
    const spent=txM.filter(t=>t.type==='expense'&&t.catId===c.id).reduce((s,t)=>s+t.amount,0);
    const pct=c.limit?Math.min(100,Math.round(spent/c.limit*100)):0;
    const over=c.limit&&spent>c.limit;
    return `<div class="cat-item" onclick="openCatModal('${c.id}')">
      <div class="cat-icon" style="background:#${c.color}22">${c.icon}</div>
      <div class="cat-info"><div class="cat-name">${c.name}</div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:${over?'#c07080':'#'+c.color}"></div></div>
      </div>
      <div class="cat-right"><div class="cat-spent" style="color:${over?'#c07080':'var(--text)'}">${fmt(spent)}</div>
        <div class="cat-limit">${c.limit?'лимит '+fmt(c.limit):'без лимита'}</div></div>
      <div class="cat-pb"><svg viewBox="0 0 160 200"><use href="#pb"/></svg></div>
    </div>`;
  }).join('');
}

function renderIncomeSources(txM){
  const el=document.getElementById('incomeSourcesList');
  const back=document.getElementById('incomeCardBack');
  if(!state.incomeSources.length){
    if(el)el.innerHTML='<div class="empty-state"><div class="ei">💰</div><p>Источников нет.<br>Нажми + чтобы добавить</p></div>';
    if(back)back.innerHTML='<div style="font-size:10px;color:var(--text);text-align:center;padding-top:6px">нет источников</div>';
    return;
  }
  const incomeTx=txM.filter(t=>t.type==='income');
  if(back){
    back.innerHTML=state.incomeSources.slice(0,3).map(s=>{
      const received=incomeTx.filter(t=>t.incomeSourceId===s.id).reduce((sum,t)=>sum+t.amount,0);
      const pct=s.expected?Math.min(100,Math.round(received/s.expected*100)):0;
      return `<div class="income-back-item"><span style="font-size:12px">${s.icon}</span><span style="flex:1;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</span><span style="font-size:10px;font-weight:800;color:var(--green-dark)">${received.toLocaleString('ru-RU')} ₽</span></div><div class="income-back-bar"><div class="income-back-bar-fill" style="width:${pct}%"></div></div>`;
    }).join('');
  }
  if(el){
    el.innerHTML=state.incomeSources.map(s=>{
      const received=incomeTx.filter(t=>t.incomeSourceId===s.id).reduce((sum,t)=>sum+t.amount,0);
      const pct=s.expected?Math.min(100,Math.round(received/s.expected*100)):0;
      return `<div class="cat-item" onclick="openIncomeSourceModal('${s.id}')">
        <div class="cat-icon" style="background:var(--green-light)">${s.icon}</div>
        <div class="cat-info"><div class="cat-name">${s.name}</div>
          <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:var(--green-dark)"></div></div>
        </div>
        <div class="cat-right"><div class="cat-spent" style="color:var(--green-dark)">${fmt(received)}</div>
          <div class="cat-limit">${s.expected?'план: '+fmt(s.expected):'без плана'}</div></div>
        <div class="goal-contrib-btn" onclick="event.stopPropagation();openIncomeContribute('${s.id}')">+</div>
      </div>`;
    }).join('');
  }
}

function renderRecentTx(txM){
  const el=document.getElementById('recentTx');
  const recent=txM.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  if(!recent.length){el.innerHTML='<div class="empty-state"><div class="ei">📋</div><p>Операций пока нет</p></div>';return;}
  el.innerHTML=recent.map(t=>txHTML(t)).join('');
}

function renderAllTx(){
  const el=document.getElementById('allTxList');
  const all=state.transactions.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!all.length){el.innerHTML='<div class="empty-state"><div class="ei">📋</div><p>Операций пока нет</p></div>';return;}
  el.innerHTML=all.map(t=>txHTML(t)).join('');
}

function txHTML(t){
  const cat=t.type==='expense'?state.categories.find(c=>c.id===t.catId):null;
  const is=t.type==='income'?state.incomeSources.find(s=>s.id===t.incomeSourceId):null;
  const icon=cat?cat.icon:(is?is.icon:(t.type==='income'?'💰':'💸'));
  const bg=cat?('#'+cat.color+'22'):(t.type==='income'?'var(--green-light)':'var(--pink-light)');
  return `<div class="tx-item" onclick="openTxModal('${t.id}')">
    <div class="tx-icon" style="background:${bg}">${icon}</div>
    <div class="tx-info"><div class="tx-name">${t.note||(cat?cat.name:(is?is.name:'Без категории'))}</div><div class="tx-date">${fmtDate(t.date)}</div></div>
    <div class="tx-amount ${t.type==='income'?'tx-income':'tx-expense'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
  </div>`;
}

function renderGoals(){
  const el=document.getElementById('goalsList');
  if(!state.goals.length){el.innerHTML='<div class="empty-state"><div class="ei">🎯</div><p>Целей пока нет.<br>Нажми + чтобы добавить</p></div>';return;}
  el.innerHTML=state.goals.map(g=>{
    const pct=Math.min(100,Math.round(g.saved/g.target*100));
    const isSaving=g.type==='saving';
    const remaining=Math.max(0,g.target-g.saved);
    return `<div class="goal-item" onclick="openGoalModal('${g.id}')">
      <div class="goal-header"><div class="goal-icon">${g.icon}</div><div class="goal-name">${g.name}</div><div class="goal-pct" style="color:${isSaving?'var(--green-dark)':'#c07080'}">${pct}%</div></div>
      <div class="goal-bar"><div class="goal-bar-fill" style="width:${pct}%;background:${isSaving?'linear-gradient(90deg,var(--green),#a8dfc0)':'linear-gradient(90deg,var(--pink),#f0a0b0)'}"></div></div>
      <div class="goal-amounts"><span><strong>${fmt(g.saved)}</strong> / ${fmt(g.target)}</span><span>${isSaving?'осталось '+fmt(remaining):'долг '+fmt(remaining)}</span></div>
      ${isSaving?`<div style="margin-top:8px;text-align:right"><span class="goal-contrib-btn" style="display:inline-flex" onclick="event.stopPropagation();openContributeModal('${g.id}')">+</span></div>`:''}
    </div>`;
  }).join('');
}

// ── CHARTS ──
function renderDonut(txM){
  const canvas=document.getElementById('donutChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const byCat={};
  txM.filter(t=>t.type==='expense').forEach(t=>{
    const cat=state.categories.find(c=>c.id===t.catId);
    const name=cat?cat.name:'Без категории';
    byCat[name]=(byCat[name]||0)+t.amount;
  });
  const labels=Object.keys(byCat);
  const values=Object.values(byCat);
  const total=values.reduce((s,v)=>s+v,0);
  document.getElementById('donutTotal').textContent=fmt(total);
  
  if(donutChart)donutChart.destroy();
  const bgColors=labels.map((_,i)=>'#'+(state.categories[i]?state.categories[i].color:'C4C0BA'));
  donutChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:bgColors,borderWidth:2,borderColor:'var(--surface)'}]},
    options:{cutout:'65%',plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:true}
  });
  
  const legend=document.getElementById('donutLegend');
  if(legend){
    legend.innerHTML=labels.slice(0,5).map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${bgColors[i]}"></div>${l}<span class="legend-pct">${total?Math.round(values[i]/total*100):0}%</span></div>`).join('');
  }
}

function renderBar(txM){
  const canvas=document.getElementById('barChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const income=txM.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txM.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  if(barChart)barChart.destroy();
  barChart=new Chart(ctx,{
    type:'bar',
    data:{labels:['Доходы','Расходы'],datasets:[{data:[income,expense],backgroundColor:['#7DC4A0','#E8A0B0'],borderRadius:8,borderSkipped:false}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'var(--border)'},ticks:{color:'var(--muted)'}},x:{grid:{display:false},ticks:{color:'var(--text)',font:{size:10}}}},responsive:true,maintainAspectRatio:false}
  });
}

// ── EXPORT ──
function exportExcel(){
  loadXlsx(()=>{
    const data=[['Дата','Тип','Категория/Источник','Сумма','Заметка']];
    state.transactions.sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
      const cat=t.type==='expense'?state.categories.find(c=>c.id===t.catId):null;
      const is=t.type==='income'?state.incomeSources.find(s=>s.id===t.incomeSourceId):null;
      data.push([t.date,t.type==='income'?'Доход':'Расход',cat?cat.name:(is?is.name:''),t.amount,t.note||'']);
    });
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:12},{wch:10},{wch:20},{wch:14},{wch:25}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Операции');
    XLSX.writeFile(wb,'motherlode_export.xlsx');
    toast('📊 Excel скачан');
  });
}

function exportPDF(){
  const txM=getActiveTx();
  const income=txM.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txM.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  
  let report=`📊 ОТЧЁТ: ${months[activeMonth]} ${activeYear}\n${'─'.repeat(30)}\n\n`;
  report+=`💰 Доходы: ${fmt(income)}\n💸 Расходы: ${fmt(expense)}\n📈 Баланс: ${fmt(income-expense)}\n\n`;
  
  if(state.incomeSources.length){
    report+=`📥 ИСТОЧНИКИ ДОХОДА:\n`;
    state.incomeSources.forEach(s=>{
      const received=txM.filter(t=>t.type==='income'&&t.incomeSourceId===s.id).reduce((sum,t)=>sum+t.amount,0);
      report+=`  ${s.icon} ${s.name}: ${fmt(received)}`;
      if(s.expected)report+=` (план: ${fmt(s.expected)})`;
      report+='\n';
    });
    report+='\n';
  }
  
  if(state.categories.length){
    report+=`📤 РАСХОДЫ ПО КАТЕГОРИЯМ:\n`;
    state.categories.forEach(c=>{
      const spent=txM.filter(t=>t.type==='expense'&&t.catId===c.id).reduce((s,t)=>s+t.amount,0);
      const pct=expense?Math.round(spent/expense*100):0;
      report+=`  ${c.icon} ${c.name}: ${fmt(spent)} (${pct}%)`;
      if(c.limit)report+=` лимит: ${fmt(c.limit)}`;
      report+='\n';
    });
    report+='\n';
  }
  
  if(state.goals.length){
    report+=`🎯 ЦЕЛИ:\n`;
    state.goals.forEach(g=>{
      const pct=Math.round(g.saved/g.target*100);
      report+=`  ${g.icon} ${g.name}: ${fmt(g.saved)} / ${fmt(g.target)} (${pct}%)\n`;
    });
    report+='\n';
  }
  
  report+=`${'─'.repeat(30)}\n📱 motherlode · ${new Date().toLocaleDateString('ru-RU')}`;
  
  document.getElementById('reportContent').textContent=report;
  openModal('reportModal');
}

function copyReport(){
  const text=document.getElementById('reportContent').textContent;
  navigator.clipboard.writeText(text).then(()=>toast('📋 Скопировано'));
}

// ── CLEAR MONTH ──
async function clearMonth(){
  if(!confirm('Удалить ВСЕ операции за текущий месяц?'))return;
  const txM=getActiveTx();
  if(!txM.length){toast('Нет операций для удаления');return;}
  setSyncing(true);
  const ids=txM.map(t=>t.id);
  const {error}=await sb.from('transactions').delete().in('id',ids);
  if(error){console.error(error);toast('❌ Ошибка');setSyncing(false);return;}
  state.transactions=state.transactions.filter(t=>!isActiveMonth(t.date));
  setSyncing(false);
  toast('🗑️ Месяц очищен');
  renderAll();
}

function renderAll(){
  renderHome();
  renderAllTx();
  renderGoals();
}

// ── INIT ──
async function initApp(){
  try{
    setSyncing(true);
    // Load settings
    const {data:settings}=await sb.from('user_settings').select('*').eq('user_id',userId).maybeSingle();
    if(settings){
      state.budget.income=settings.budget_income||60000;
      if(settings.theme)applyTheme(settings.theme==='dark');
    }
    
    // Load categories
    const {data:cats}=await sb.from('categories').select('*').eq('user_id',userId).order('sort_order');
    if(cats&&cats.length)state.categories=mapCats(cats);
    else{await createDefaultCategories();const {data:newCats}=await sb.from('categories').select('*').eq('user_id',userId).order('sort_order');state.categories=mapCats(newCats||[]);}
    
    // Load transactions
    const {data:txs}=await sb.from('transactions').select('*').eq('user_id',userId).order('date',{ascending:false});
    state.transactions=(txs||[]).map(mapTx);
    
    // Load goals
    const {data:goals}=await sb.from('goals').select('*').eq('user_id',userId);
    state.goals=(goals||[]).map(mapGoal);
    
    // Load income sources
    const {data:sources}=await sb.from('income_sources').select('*').eq('user_id',userId);
    state.incomeSources=(sources||[]).map(mapIncomeSource);
    
    setSyncing(false);
    document.getElementById('loadingScreen').classList.add('hidden');
    updateHeader();
    renderAll();
  }catch(e){
    console.error('Init error:',e);
    document.getElementById('loadingScreen').classList.add('hidden');
    toast('⚠️ Ошибка загрузки данных');
  }
}

async function createDefaultCategories(){
  const d=[
    {name:'Еда',icon:'🛒',color:'7DC4A0',limit_amount:12000,sort_order:0},
    {name:'Транспорт',icon:'🚗',color:'B4A7D6',limit_amount:4000,sort_order:1},
    {name:'Кафе',icon:'☕',color:'E8C4A0',limit_amount:5000,sort_order:2},
    {name:'Квартира',icon:'🏠',color:'A7C4D6',limit_amount:25000,sort_order:3},
    {name:'Здоровье',icon:'💊',color:'E8A0B0',limit_amount:3000,sort_order:4},
    {name:'Прочее',icon:'📦',color:'C4C0BA',limit_amount:0,sort_order:5}
  ];
  await sb.from('categories').insert(d.map(x=>({...x,user_id:userId})));
}

// ── FAB ──
document.getElementById('fab').onclick=()=>openTxModal();

// ── START ──
initApp();
</script>
